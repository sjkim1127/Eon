[workspace]
resolver = "2"
members = [
    "crates/eon-core",
    "crates/eon-saju",
    "crates/eon-data",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Eon Team"]
license = "MIT"
repository = "https://github.com/your-org/eon"

[workspace.dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
