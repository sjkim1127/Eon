[workspace]
resolver = "2"
members = [
    "crates/eon-core",
    "crates/eon-saju",
    "crates/eon-data",
    "crates/eon-astro",
    "crates/eon-ai", "crates/eon-vedic",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Eon Team"]
license = "MIT"
repository = "https://github.com/your-org/eon"

[workspace.dependencies]
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
swiss-eph = "0.2"
bincode = "1.3"
