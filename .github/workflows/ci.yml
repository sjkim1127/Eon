name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  lints:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy Linter
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run Tests & Generate Coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  release-preflight:
    name: Release Package Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Validate lockstep versions
        run: python3 scripts/sync_release_version.py --check
      - name: Refresh full lockfile graph for manifest changes
        run: cargo metadata --format-version 1 >/dev/null
      - name: Commit synchronized lockfile
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: synchronize Cargo.lock"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
      - name: Verify Cargo.lock is committed
        run: git diff --exit-code -- Cargo.lock
      - name: Package eon-core
        run: cargo package -p eon-core --locked --no-verify
      - name: Package eon-astro
        run: cargo package -p eon-astro --locked --no-verify
      - name: Package eon-data
        run: cargo package -p eon-data --locked --no-verify
      - name: Package eon-saju
        run: cargo package -p eon-saju --locked --no-verify
      - name: Package eon-vedic
        run: cargo package -p eon-vedic --locked --no-verify
      - name: Package eon-zwds
        run: cargo package -p eon-zwds --locked --no-verify
      - name: Package eon-western
        run: cargo package -p eon-western --locked --no-verify
      - name: Package eon-human-design
        run: cargo package -p eon-human-design --locked --no-verify
      - name: Package eon-qimen
        run: cargo package -p eon-qimen --locked --no-verify
      - name: Package eon-ai
        run: cargo package -p eon-ai --locked --no-verify
      - name: Package eon-service
        run: cargo package -p eon-service --locked --no-verify

  wasm-build:
    name: WASM Build & Size Monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (nightly + wasm target)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli@0.6.1
      - name: Install WASI SDK
        run: |
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz
          sudo tar xf wasi-sdk-24.0-x86_64-linux.tar.gz -C /opt
          sudo ln -sf /opt/wasi-sdk-24.0-x86_64-linux /opt/wasi-sdk
      - name: Build Web App (Dioxus Release)
        working-directory: ./crates/eon-ui
        env:
          CARGO_BUILD_JOBS: 1
          CC_wasm32_unknown_unknown: clang
          AR_wasm32_unknown_unknown: llvm-ar
          WASI_SDK_PATH: /opt/wasi-sdk
          CFLAGS: "-matomics -mbulk-memory"
          CFLAGS_wasm32_unknown_unknown: "-matomics -mbulk-memory"
          "CFLAGS_wasm32-unknown-unknown": "-matomics -mbulk-memory"
        run: dx build --release --trace
      - name: Measure & Report WASM File Size
        run: |
          echo "### WebAssembly Binary Sizes 📊" >> $GITHUB_STEP_SUMMARY
          echo "| File Path | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          find target -name "*.wasm" -exec ls -lh {} \; | awk '{print "| `" $9 "` | **" $5 "** |"}' >> $GITHUB_STEP_SUMMARY
