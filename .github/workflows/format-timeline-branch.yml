name: Format timeline branch

on:
  push:
    branches:
      - improve/timeline-chart

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, 'style: format timeline chart') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: improve/timeline-chart

      - name: Install Rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/eon-ui/src/components/tabs/timeline_tab.rs
          git commit -m "style: format timeline chart"
          git push origin HEAD:improve/timeline-chart
