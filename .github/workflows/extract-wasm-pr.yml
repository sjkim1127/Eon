name: WASM Error Extractor

on:
  pull_request:
    branches: ["main"]

permissions:
  actions: read

jobs:
  extract:
    name: Extract failed WASM log
    runs-on: ubuntu-latest
    steps:
      - name: Print linker error
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/86566691471/logs" \
            -o /tmp/job.log
          sed -E 's/\x1B\[[0-9;]*[mK]//g' /tmp/job.log \
            | grep -E 'rust-lld|wasm-ld|error:|undefined symbol|unknown argument|shared-memory|maximum memory|initial memory|TLS|cannot|failed' \
            | cut -c1-1200 \
            | tail -n 120
