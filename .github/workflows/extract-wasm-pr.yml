name: WASM Error Extractor

on:
  pull_request:
    branches: ["main"]

permissions:
  actions: read

jobs:
  extract:
    name: Extract failed WASM log
    runs-on: ubuntu-latest
    steps:
      - name: Print compiler error
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/86566691471/logs" \
            -o /tmp/job-log.zip
          unzip -p /tmp/job-log.zip > /tmp/job.log
          grep -A 18 -B 8 -E 'error(\[|:)|failed|Caused by' /tmp/job.log | tail -n 160
