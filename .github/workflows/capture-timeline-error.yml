name: Capture timeline compile error

on:
  push:
    branches:
      - improve/timeline-chart

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: improve/timeline-chart

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Capture compiler output
        shell: bash
        run: |
          set +e
          cargo check -p eon-ui > /tmp/timeline-check.log 2>&1
          status=$?
          mkdir -p .github/diagnostics
          {
            echo "exit_status=$status"
            grep -n -A 12 -B 4 -E "error(\[|:)|warning:" /tmp/timeline-check.log || true
            echo "--- tail ---"
            tail -n 120 /tmp/timeline-check.log
          } > .github/diagnostics/timeline-check.log
          exit 0

      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/diagnostics/timeline-check.log
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "diagnostics: capture timeline compile error"
          git push origin HEAD:improve/timeline-chart
