name: Capture timeline WASM error

on:
  push:
    branches:
      - improve/timeline-chart

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: improve/timeline-chart

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli@0.6.1

      - name: Install WASI SDK
        run: |
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz
          sudo tar xf wasi-sdk-24.0-x86_64-linux.tar.gz -C /opt
          sudo ln -sf /opt/wasi-sdk-24.0-x86_64-linux /opt/wasi-sdk

      - name: Capture Dioxus WASM output
        working-directory: ./crates/eon-ui
        env:
          CARGO_BUILD_JOBS: 1
          CC_wasm32_unknown_unknown: clang
          AR_wasm32_unknown_unknown: llvm-ar
          WASI_SDK_PATH: /opt/wasi-sdk
          CFLAGS_wasm32_unknown_unknown: "-matomics -mbulk-memory"
        shell: bash
        run: |
          set +e
          dx build --release --trace > /tmp/timeline-wasm.log 2>&1
          status=$?
          mkdir -p ../../.github/diagnostics
          {
            echo "exit_status=$status"
            grep -n -A 16 -B 6 -E "error(\[|:)|failed|Caused by" /tmp/timeline-wasm.log || true
            echo "--- tail ---"
            tail -n 180 /tmp/timeline-wasm.log
          } > ../../.github/diagnostics/timeline-wasm.log
          exit 0

      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/diagnostics/timeline-wasm.log
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "diagnostics: capture timeline WASM error"
          git push origin HEAD:improve/timeline-chart
