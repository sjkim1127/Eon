name: Deploy API Docs

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build API Documentation
        run: cargo doc --workspace --no-deps

      - name: Add Redirect Index Page
        run: |
          echo '<meta http-equiv="refresh" content="0; url=eon_service/index.html">' > target/doc/index.html
          echo '<a href="eon_service/index.html">Redirecting to Eon Service API documentation...</a>' >> target/doc/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: target/doc
          branch: gh-pages
          clean: true
