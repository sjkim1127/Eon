name: Extract WASM failure

on:
  push:
    branches:
      - improve/timeline-chart

permissions:
  actions: read
  pull-requests: write
  issues: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/86566691471/logs" \
            -o /tmp/job-log.zip
          unzip -p /tmp/job-log.zip > /tmp/job.log

      - name: Post compiler error to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### WASM diagnostic'
            echo
            echo '```text'
            grep -A 18 -B 8 -E 'error(\[|:)|failed|Caused by' /tmp/job.log | tail -n 160
            echo '```'
          } > /tmp/comment.md
          gh pr comment 23 --repo "${{ github.repository }}" --body-file /tmp/comment.md
